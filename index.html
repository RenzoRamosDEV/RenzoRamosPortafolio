  <!-- Preconnect para optimizar fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="dns-prefetch" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="src/styles/tweaks-panel.css">

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>
  <!-- Navegación Principal -->
  <nav role="navigation" aria-label="Navegación principal">
    <div class="nav-inner">
      <!-- Botón menú hamburguesa (mobile) -->
      <button class="nav-hamburger" id="nav-hamburger" aria-label="Abrir menú de navegación" aria-expanded="false" aria-controls="nav-menu">
        <span></span>
        <span></span>

      <ul class="nav-links" id="nav-links">

        <li><a href="#proyectos" data-i18n="navProjects" aria-label="Ir a proyectos"></a></li>
      </ul>

      <div class="nav-signature" aria-label="Logo del sitio">
        <span class="nav-signature-full">Renzo<span>.</span>Ramos</span>
        <span class="nav-signature-short">R<span>.</span>R</span>
      </div>

      <div class="nav-controls" role="toolbar" aria-label="Controles de interfaz">

              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                aria-hidden="true">
                <circle cx="12" cy="12" r="10" />

                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />

              </svg>
              <span id="dark-label" data-i18n="darkLabel"></span>

        </div>

        <button class="nav-btn" id="lang-btn-desktop" title="Cambiar idioma" aria-label="Cambiar idioma (actualmente español)"

          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            aria-hidden="true">
            <circle cx="12" cy="12" r="10" />
            <line x1="2" y1="12" x2="22" y2="12" />
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
          </svg>
          <span id="lang-label-desktop">EN</span>

        <button class="nav-btn" id="dark-btn-desktop" title="Alternar modo oscuro" aria-label="Alternar modo oscuro"
          aria-pressed="false" hidden>
          <svg id="dark-icon-desktop" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
          <span id="dark-label-desktop" data-i18n="darkLabel"></span>

    <div class="nav-mobile-menu" id="nav-menu" hidden>
      <ul class="nav-mobile-links">
        <li><a href="#sobre-mi" data-i18n="navAbout" aria-label="Ir a sobre mí"></a></li>

      <div class="hero-text reveal">
        <p class="hero-label" data-i18n="heroLabel"></p>
        <h1 class="hero-name" id="hero-name" data-i18n="heroName"></h1>
        <p class="hero-role" data-i18n="heroRole"></p>
        <p class="hero-bio" data-i18n="heroBio"></p>

        <div class="hero-chips" role="list" aria-label="Enlaces de contacto">
          <a href="https://www.linkedin.com/in/tu-usuario" target="_blank" rel="noopener noreferrer"
            class="hero-chip" role="listitem" aria-label="Perfil de LinkedIn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" />
              <rect x="2" y="9" width="4" height="12" />
              <circle cx="4" cy="4" r="2" />
            </svg>
            <span>LinkedIn</span>
          </a>

          <a href="https://gitlab.com/tu-usuario" target="_blank" rel="noopener noreferrer" class="hero-chip"
            role="listitem" aria-label="Perfil de GitLab">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path
                d="M22.65 14.39L12 22.13 1.35 14.39a.84.84 0 0 1-.3-.94l1.22-3.78 2.44-7.51A.42.42 0 0 1 4.82 2a.43.43 0 0 1 .58 0 .42.42 0 0 1 .11.18l2.44 7.49h8.1l2.44-7.49a.42.42 0 0 1 .11-.18.43.43 0 0 1 .58 0 .42.42 0 0 1 .11.18l2.44 7.51 1.22 3.78a.84.84 0 0 1-.3.94z" />
            </svg>
            <span>GitLab</span>
          </a>

          <a href="mailto:renzoramosivan@gmail.com" class="hero-chip" role="listitem" aria-label="Enviar correo">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              aria-hidden="true">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <polyline points="22,6 12,13 2,6" />
            </svg>
            <span>Correo</span>
          </a>
        </div>
      </div>

      <div class="hero-visual reveal reveal-delay-2">
        <div class="avatar-frame">
          <div class="avatar-placeholder" aria-label="Foto de perfil">
            <div class="avatar-icon" aria-hidden="true">✦</div>
            <p class="avatar-caption">foto / avatar<br>aquí</p>
          </div>
        </div>
      </div>

      <p class="section-label reveal" data-i18n="stackLabel"></p>

    </div>

    <div class="footer-inner">
      <div class="footer-sig" aria-label="Firma del sitio">

    </div>

  <!-- Panel de Edición -->
  <div id="tweaks-root" aria-label="Panel de personalización flotante"></div>

  <!-- Scripts -->
  <script src="src/components/tweaks-panel.jsx" defer></script>
  <script type="module" src="src/js/main.js" defer></script>
